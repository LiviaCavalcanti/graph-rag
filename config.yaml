data:
  active: [autopatch]
  autopatch:
    root: CVE-list
    graphml_root: graphml_augmented
    include_variants: true
  cvefixes:
    db_path: data/cvefixes/CVEfixes.db
    graphml_root: graphml_cvefixes
    languages: [C, C++]
    level: method
    max_lines: 500
    sample_limit: 0
joern:
  workers: 8
  timeout_s: 120
  bin_dir: /bin/joern/joern-cli
graph:
  node_types:
    - METHOD
    - METHOD_PARAMETER_IN
    - METHOD_PARAMETER_OUT
    - METHOD_RETURN
    - BLOCK
    - LOCAL
    - CALL
    - IDENTIFIER
    - LITERAL
    - RETURN
    - CONTROL_STRUCTURE
    - FIELD_IDENTIFIER
    - UNKNOWN
  edge_types:
    - AST
    - CFG
    - CDG
    - REF
    - ARGUMENT
    - RECEIVER
embeddings:
  active: [gin, combined]
  dim: 128
  projection: pca              # pca | none
  l2_normalize: true            # true | false
  netlsd:
    timescales: 128
  wl:
    num_iterations: 4
    hidden_dim: 64
  gin:
    hidden_dim: 128
    num_layers: 3
    seed: 42
  rgcn:
    hidden_dim: 128
    num_layers: 3
    seed: 42
  codebert:
    model_path: /home/z0050s2b/code/graph-rag/models/codebert-base/
  gin_codebert:
    hidden_dim: 128
    num_layers: 3
    dropout: 0.3
    device: cpu
    cb_batch_size: 32
    node_cache_dir: workspace/node_codebert_cache
    checkpoint_path: experiments/output/gin_codebert_training/gin_codebert_checkpoint.pt
    training:
      lr: 0.001
      weight_decay: 0.0001
      margin: 0.3
      epochs: 50
      batch_size: 16
      triplets_per_epoch: 256
      patience: 10
      mine_every: 5
  gin_struct:
    hidden_dim: 128
    num_layers: 3
    dropout: 0.2
    device: cpu
    checkpoint_path: experiments/output/gin_struct_training/gin_struct_checkpoint.pt
    training:
      lr: 0.00001
      weight_decay: 0.0001
      margin: 0.3
      epochs: 100
      batch_size: 32
      triplets_per_epoch: 512
      patience: 20
      mine_every: 5
      label_mode: cve           # cve or dir_name
      warm_start: true
rag:
  index_path: src/rag/faiss.index
  metadata_path: src/rag/metadata.json
  top_k: 5
  embedding_variant: wl
  prompt_variant: graph       # default | graph
experiment:
  split:
    enabled: true
    stratified: true
    seed: 42
    test_ratio: 0.2
    include_real_in_index: true
    augmented_train_ratio: 0.5
    query_source: graphml_augmented
