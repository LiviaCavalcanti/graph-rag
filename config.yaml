data:
  autopatch:
    root: CVE-list
    graphml_root: graphml
    add_variants: false
joern:
  workers: 8
  timeout_s: 120
  bin_dir: /home/YOUR-USER/bin/joern/joern-cli
graph:
  node_types:
    - METHOD
    - METHOD_PARAMETER_IN
    - METHOD_PARAMETER_OUT
    - METHOD_RETURN
    - BLOCK
    - LOCAL
    - CALL
    - IDENTIFIER
    - LITERAL
    - RETURN
    - CONTROL_STRUCTURE
    - FIELD_IDENTIFIER
    - UNKNOWN
  edge_types:
    - AST
    - CFG
    - CDG
    - REF
    - ARGUMENT
    - RECEIVER
embeddings:
  active: [wl, gin, rgcn, combined, codebert_seq, codebert_pattern]
  dim: 128
  projection: pca              # pca | none
  l2_normalize: true            # true | false
  netlsd:
    timescales: 128
  wl:
    num_iterations: 4
    hidden_dim: 64
  gin:
    hidden_dim: 128
    num_layers: 3
    seed: 42
  rgcn:
    hidden_dim: 128
    num_layers: 3
    seed: 42
  codebert:
    model_path: /home/z0050s2b/code/graph-rag/models/codebert-base/
rag:
  index_path: src/rag/faiss.index
  metadata_path: src/rag/metadata.json
  top_k: 5
  embedding_variant: wl
experiment:
  split:
    enabled: true
    stratified: true
    seed: 42
    test_ratio: 0.2
    include_real_in_index: true
    augmented_train_ratio: 0.5
    query_source: graphml_augmented
